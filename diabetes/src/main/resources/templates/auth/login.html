<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Care System</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="stylesheet" href="/static/css/pages/auth.css">
</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <div class="logo">
            <i class="fa-solid fa-droplet"></i>
            <h2>Diabetes Care System</h2>
        </div>

        <div class="welcome">
            <h1>Hệ thống Quản lý Bệnh Tiểu đường</h1>

            <h2>Chào mừng trở lại</h2>

            <p>
                Đăng nhập để quản lý hồ sơ bệnh nhân và theo dõi điều trị.
            </p>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div class="login-box">

            <h1>Đăng nhập</h1>

            <!-- PHONE -->
            <div class="input-group">

                <label>Số điện thoại</label>

                <div class="input-field">
                    <i class="fa-solid fa-phone"></i>

                    <input type="text" placeholder="0912 345 678">
                </div>

            </div>

            <!-- PASSWORD -->
            <div class="input-group">

                <label>Mật khẩu</label>

                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>

                    <input type="password" placeholder="••••••••">
                </div>

            </div>

            <!-- BUTTON -->
            <button class="login-btn">
                <i class="fa-solid fa-right-to-bracket"></i>
                Đăng nhập
            </button>

            <!-- REGISTER -->
            <p class="register">
                Chưa có tài khoản?
                <a href="#">Đăng ký ngay</a>
            </p>

        </div>

        <!-- FOOTER -->
        <div class="footer">

            <p>
                © 2024 Diabetes Care System - Giải pháp quản lý bệnh tiểu đường
            </p>

            <div class="footer-links">
                <a href="#">Chính sách bảo mật</a>

                <span>|</span>

                <a href="#">Điều khoản sử dụng</a>

                <span>|</span>

                <a href="#">Hỗ trợ</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
